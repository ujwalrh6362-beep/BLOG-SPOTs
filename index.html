<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Single Admin Blog</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>
<h1>My Blog</h1>
<nav>
<a onclick="openAdmin()">Admin</a>
</nav>
</header>

<section class="hero">
<h2>Read Latest Blogs</h2>
<p>Only admin can publish. Everyone can read.</p>
</section>

<section class="blogs" id="blogs"></section>

<footer>© 2026 Single Admin Blog</footer>

<!-- LOGIN -->
<div class="modal" id="loginModal">
<div class="box">
<span class="close" onclick="closeLogin()">✖</span>
<h2>Admin Login</h2>
<input type="email" id="email" placeholder="Admin Email">
<input type="password" id="password" placeholder="Password">
<button class="adminbtn" onclick="login()">Login</button>
</div>
</div>

<!-- ADMIN -->
<div class="modal" id="adminPanel">
<div class="box">
<span class="close" onclick="closeAdmin()">✖</span>
<h2>Create Blog</h2>
<input type="text" id="title" placeholder="Blog Title">
<input type="file" id="image" accept="image/*">
<textarea id="content" placeholder="Write blog here..."></textarea>
<button class="adminbtn" onclick="publishBlog()">Publish Blog</button>
</div>
</div>

<!-- VIEW BLOG -->
<div class="modal" id="viewBlog">
<div class="box">
<span class="close" onclick="closeView()">✖</span>
<h2 id="readTitle"></h2>
<img id="readImage">
<div class="readcontent" id="readContent"></div>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBSUWfXI0ymdpLUj50a66RtChT2KNNUVb4",
authDomain: "myblog-2e769.firebaseapp.com",
projectId: "myblog-2e769",
storageBucket: "myblog-2e769.firebasestorage.app",
messagingSenderId: "334369224950",
appId: "1:334369224950:web:1700bbb52729f4c15794d7",
measurementId: "G-VB61HH3TPQ"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.isAdmin=false;
window.blogDocs=[];

window.openAdmin=()=>document.getElementById("loginModal").style.display="flex";
window.closeLogin=()=>document.getElementById("loginModal").style.display="none";
window.closeAdmin=()=>document.getElementById("adminPanel").style.display="none";
window.closeView=()=>document.getElementById("viewBlog").style.display="none";

window.login = async function(){
try{
await signInWithEmailAndPassword(
auth,
document.getElementById("email").value.trim(),
document.getElementById("password").value
);

window.isAdmin=true;

closeLogin();
document.getElementById("adminPanel").style.display="flex";

loadBlogs();

}catch(err){
alert(err.message);
}
};

window.publishBlog = async function(){

const title=document.getElementById("title").value.trim();
const content=document.getElementById("content").value.trim();
const file=document.getElementById("image").files[0];

if(!title || !content){
alert("Fill all fields");
return;
}

let imageURL="";

if(file){
const reader=new FileReader();

reader.onloadend=async function(){
imageURL=reader.result;
saveBlog(title,content,imageURL);
};

reader.readAsDataURL(file);

}else{
saveBlog(title,content,"");
}
};

async function saveBlog(title,content,imageURL){
try{
await addDoc(collection(db,"blogs"),{
title,
content,
image:imageURL,
date:Date.now()
});

alert("Published!");

document.getElementById("title").value="";
document.getElementById("content").value="";
document.getElementById("image").value="";

loadBlogs();

}catch(err){
alert(err.message);
}
}

window.deleteBlog = async function(i){

if(!confirm("Delete this blog?")) return;

try{
await deleteDoc(doc(db,"blogs",window.blogDocs[i]));
loadBlogs();
}catch(err){
alert(err.message);
}
};

async function loadBlogs(){

const q=query(collection(db,"blogs"),orderBy("date","desc"));
const snap=await getDocs(q);

let html="";
let arr=[];
let ids=[];

snap.forEach((d)=>{
arr.push(d.data());
ids.push(d.id);
});

window.blogData=arr;
window.blogDocs=ids;

arr.forEach((blog,i)=>{
html+=`
<div class="card">

${blog.image ? `<img src="${blog.image}" class="thumb">` : ""}

<div class="card-content">
<h3>${blog.title}</h3>
<p>${blog.content.substring(0,100)}...</p>

<button onclick="readBlog(${i})">Read More</button>

${window.isAdmin ? `<button onclick="deleteBlog(${i})" style="margin-left:8px;background:#ef4444;">Delete</button>` : ""}

</div>
</div>
`;
});

document.getElementById("blogs").innerHTML=html;
}

window.readBlog=function(i){
const blog=window.blogData[i];

document.getElementById("readTitle").innerText=blog.title;
document.getElementById("readContent").innerText=blog.content;

if(blog.image){
document.getElementById("readImage").src=blog.image;
document.getElementById("readImage").style.display="block";
}else{
document.getElementById("readImage").style.display="none";
}

document.getElementById("viewBlog").style.display="flex";
};

loadBlogs();

</script>

</body>
</html>
